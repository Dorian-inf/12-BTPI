		<script>
    // Efecto de aparición al hacer scroll
    const observarElementos = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.style.opacity = "1";
                entry.target.style.transform = "translateY(0)";
            }
        });
    }, { threshold: 0.1 });

    // Aplicar a todas las tarjetas
    document.querySelectorAll('.tarjeta-clase-pro, .tarjeta-docente, .tarjeta-cristal').forEach(tarjeta => {
        tarjeta.style.opacity = "0";
        tarjeta.style.transform = "translateY(30px)";
        tarjeta.style.transition = "all 0.6s ease-out";
        observarElementos.observe(tarjeta);
    });
</script>
